<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shifokor Maslahati</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial;
    }

    body{
        background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        padding:20px;
        color:white;
    }

    .container{
        width:100%;
        max-width:900px;
        background:rgba(255,255,255,0.08);
        backdrop-filter:blur(10px);
        border-radius:25px;
        padding:30px;
        box-shadow:0 0 25px rgba(0,0,0,0.4);
    }

    h1{
        text-align:center;
        margin-bottom:20px;
        font-size:40px;
        color:#00ffd5;
    }

    textarea{
        width:100%;
        height:140px;
        padding:15px;
        border:none;
        border-radius:15px;
        font-size:18px;
        resize:none;
        outline:none;
        margin-top:10px;
    }

    button{
        margin-top:20px;
        width:100%;
        padding:15px;
        border:none;
        border-radius:15px;
        background:#00ffd5;
        color:black;
        font-size:20px;
        cursor:pointer;
        transition:0.3s;
        font-weight:bold;
    }

    button:hover{
        transform:scale(1.03);
        background:#00c8a7;
    }

    .result{
        margin-top:25px;
        background:rgba(255,255,255,0.1);
        padding:20px;
        border-radius:15px;
        line-height:1.8;
        font-size:18px;
        min-height:150px;
    }

    .warning{
        margin-top:20px;
        color:#ffb3b3;
        font-size:14px;
        text-align:center;
    }

    .doctor{
        text-align:center;
        font-size:70px;
        margin-bottom:10px;
    }

</style>
</head>
<body>

<div class="container">

    <div class="doctor">🩺</div>

    <h1>Shifokor Maslahati</h1>

    <label>Qayeringiz og‘riyapti yoki qanday alomat bor yozing:</label>

    <textarea id="symptom" placeholder="Masalan: boshim og‘riyapti, tomog‘im qichishyapti..."></textarea>

    <button onclick="analyze()">Maslahat Olish</button>

    <div class="result" id="result">
        Bu yerda tavsiya chiqadi...
    </div>

    <div class="warning">
        ⚠️ Bu loyiha faqat o‘quv maqsadida. Kuchli og‘riq bo‘lsa haqiqiy shifokorga murojaat qiling.
    </div>

</div>

<script>

function analyze(){

    let text = document.getElementById("symptom").value.toLowerCase();

    let result = document.getElementById("result");

    if(text.includes("bosh")){
        result.innerHTML = `
        <h2>🤕 Bosh og‘rig‘i</h2>
        <br>
        Tavsiya:
        <ul>
            <li>Ko‘proq dam oling</li>
            <li>Suv iching</li>
            <li>Paracetamol yoki Ibuprofen haqida shifokordan so‘rang</li>
            <li>Telefon va kompyuterni kamaytiring</li>
        </ul>
        `;
    }

    else if(text.includes("tomoq")){
        result.innerHTML = `
        <h2>😷 Tomoq og‘rig‘i</h2>
        <br>
        Tavsiya:
        <ul>
            <li>Iliq choy iching</li>
            <li>Tomoq spreyi ishlatish mumkin</li>
            <li>Asal va limon foydali</li>
            <li>Issiq joyda dam oling</li>
        </ul>
        `;
    }

    else if(text.includes("qorin")){
        result.innerHTML = `
        <h2>🤢 Qorin og‘rig‘i</h2>
        <br>
        Tavsiya:
        <ul>
            <li>Yengil ovqat yeying</li>
            <li>Gazli ichimlik ichmang</li>
            <li>Ko‘p suv iching</li>
            <li>Og‘riq kuchaysa shifokorga boring</li>
        </ul>
        `;
    }

    else if(text.includes("yo'tal") || text.includes("yotal")){
        result.innerHTML = `
        <h2>🤧 Yo‘tal</h2>
        <br>
        Tavsiya:
        <ul>
            <li>Iliq suv iching</li>
            <li>Asalli choy iching</li>
            <li>Xona havosini nam tuting</li>
            <li>Yo‘tal siropi haqida dorixonadan so‘rang</li>
        </ul>
        `;
    }

    else if(text.includes("isitma")){
        result.innerHTML = `
        <h2>🌡️ Isitma</h2>
        <br>
        Tavsiya:
        <ul>
            <li>Dam oling</li>
            <li>Ko‘p suyuqlik iching</li>
            <li>Haroratni o‘lchab boring</li>
            <li>Yuqori isitmada shifokorga murojaat qiling</li>
        </ul>
        `;
    }

    else{
        result.innerHTML = `
        <h2>🩺 Umumiy maslahat</h2>
        <br>
        Siz yozgan alomat aniqlanmadi.
        <br><br>
        Iltimos:
        <ul>
            <li>Og‘riq joyini aniq yozing</li>
            <li>Alomatni batafsil yozing</li>
            <li>Zarurat bo‘lsa shifokorga murojaat qiling</li>
        </ul>
        `;
    }

}

</script>

</body>
</html>
